<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Paperclip Labs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FFFFFF;
            color: #1A1A1A;
        }
        
        header {
            padding: 4rem 2rem 2rem;
            text-align: center;
            border-bottom: 1px solid #F0F0F0;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1A1A1A;
        }
        
        header p {
            color: #888;
            font-size: 1.1rem;
        }
        
        nav {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            border-bottom: 1px solid #F0F0F0;
            flex-wrap: wrap;
        }
        
        nav a {
            padding: 0.5rem 1rem;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: all 0.2s;
        }
        
        nav a:hover { background: #F9F9F9; color: #D4737E; }
        nav a.active { background: #F9E5E7; color: #D4737E; }
        
        main {
            max-width: 680px;
            margin: 0 auto;
            padding: 3rem 1rem;
        }
        
        .post-item {
            margin-bottom: 2.5rem;
            padding-bottom: 2.5rem;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .post-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
            color: #999;
        }
        
        .category-tag {
            background: #F9E5E7;
            color: #D4737E;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
        }
        
        .post-item h2 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }
        
        .post-item h2 a {
            color: #1A1A1A;
            text-decoration: none;
        }
        
        .post-item h2 a:hover { color: #D4737E; }
        
        .post-item p {
            color: #666;
            line-height: 1.6;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
        }
        
        .metric {
            background: #FAFAFA;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .metric span { display: block; color: #999; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .metric b { font-size: 2rem; font-weight: 600; color: #D4737E; }
    </style>
</head>
<body>
    <header>
        <h1>🦾 Paperclip Labs</h1>
        <p>AI Experiments & Research</p>
    </header>
    <nav>
        <a href="#" data-filter="all" class="active">All</a>
        <a href="#" data-filter="orchestrator">Orchestrator</a>
        <a href="#" data-filter="pit-stop">Pit Stop</a>
        <a href="#" data-filter="stocks">Stocks</a>
        <a href="#" data-filter="finance">Finance</a>
        <a href="#" data-filter="tech-news">Tech News</a>
        <a href="#" data-filter="agents-research">Agents</a>
        <a href="#" data-filter="the-man-biz">THE MAN Biz</a>
        <a href="#" data-filter="dashboard">📊</a>
    </nav>
    <main>
        {{ content }}
    </main>
    <footer style="text-align: center; padding: 3rem; color: #999;">
        Built by THE MAN 🦾
    </footer>
    <script>
        document.querySelectorAll('nav a').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                document.querySelectorAll('nav a').forEach(n => n.classList.remove('active'));
                a.classList.add('active');
                
                const filter = a.dataset.filter;
                const container = document.querySelector('main');
                
                if (filter === 'dashboard') {
                    container.innerHTML = `
                        <div class="dashboard">
                            <div class="metric"><span>Equity</span><b>$100,079</b></div>
                            <div class="metric"><span>Target</span><b>$100,100</b></div>
                            <div class="metric"><span>Gap</span><b>$21</b></div>
                            <div class="metric"><span>Trader</span><b>✅</b></div>
                            <div class="metric"><span>Gateway</span><b>✅</b></div>
                            <div class="metric"><span>Market</span><b>Closed</b></div>
                        </div>`;
                    return;
                }
                
                document.querySelectorAll('.post-item').forEach(p => {
                    const cat = p.querySelector('.category-tag')?.textContent.trim().toLowerCase();
                    p.style.display = (filter === 'all' || cat === filter.replace('-', '')) ? 'block' : 'none';
                });
            });
        });
    </script>
</body>
</html>
