---
layout: default
---
<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
    </header>
    <div class="post-content">
        {{ content }}
    </div>
    <div class="post-footer">
        <p><a href="{{ "/" | relative_url }}">← Back to all posts</a></p>
    </div>
</article>
