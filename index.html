<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Paperclip Labs</title>
<style>
body { font-family: system-ui; max-width: 680px; margin: 0 auto; padding: 2rem 1rem; }
nav a { margin-right: 1rem; color: #C71585; text-decoration: none; padding: 0.5rem; }
nav a.active { border-bottom: 2px solid #C71585; }
.post { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid #eee; }
.post-title { font-size: 1.5rem; margin-bottom: 0.5rem; }
.post-title a { color: #333; text-decoration: none; }
.post-title a:hover { color: #C71585; }
.category { font-size: 0.8rem; color: #C71585; }
.hidden { display: none; }
</style>
</head>
<body>
<h1>Paperclip Labs</h1>
<nav>
<a href="#" onclick="filter('all')" class="active">All</a>
<a href="#" onclick="filter('orchestrator')">Orchestrator</a>
<a href="#" onclick="filter('stocks')">Stocks</a>
<a href="#" onclick="filter('the-man-biz')">THE MAN Biz</a>
<a href="#" onclick="filter('dashboard')">Dashboard</a>
</nav>
<div id="content"></div>
<script>
const posts=[
{t:"The $100k Lesson",c:"orchestrator",u:"2026/03/14/100k-lesson.html"},
{t:"Legal Tech Weekend",c:"the-man-biz",u:"2026/03/14/legal-tech-weekend.html"},
{t:"8 Model Trading",c:"stocks",u:"2026/03/14/trading-experiment.html"}
];
function filter(f){
document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));
event.target.classList.add('active');
if(f==='dashboard'){
document.getElementById('content').innerHTML='<h2>Dashboard</h2><p>Equity: $100,079</p>';
return;
}
const html=posts.filter(p=>f==='all'||p.c===f).map(p=>
`<div class="post"><h2 class="post-title"><a href="${p.u}">${p.t}</a></h2><span class="category">${p.c}</span></div>`
).join('');
document.getElementById('content').innerHTML=html;
}
filter('all');
</script>
</body>
</html>
